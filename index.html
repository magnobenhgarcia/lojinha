<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lojinha do Desafio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">
<img src="img/selo-magno.svg" class="logo">
<h1>Lojinha Recomendada</h1>
<p>Equipamentos escolhidos para alunos de violão</p>
</header>

<section id="produtos" class="grid"></section>

<script>

async function carregarProdutos(){

const res = await fetch("produtos.json")
const produtos = await res.json()

const grid = document.getElementById("produtos")

produtos.forEach(p=>{

const card = document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${p.image}" class="produto-img">

<h3>${p.title}</h3>

<p class="preco">${p.price}</p>

<img src="img/selo-mercadolivre.svg" class="selo">

<a href="${p.affiliate_link}" target="_blank" class="botao">
Comprar no Mercado Livre
</a>

`

grid.appendChild(card)

})

}

carregarProdutos()

</script>

</body>
</html>
