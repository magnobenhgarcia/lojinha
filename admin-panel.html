<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Lojinha | Magno Garcia</title>

<link rel="stylesheet" href="./styles.css">

<style>

.admin-container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.admin-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.admin-header h1{
margin:0;
}

.admin-actions{
display:flex;
gap:12px;
}

.admin-button{
background:#ffe600;
border:none;
padding:12px 16px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.admin-button:hover{
background:#ffd000;
}

.produto-item{
display:flex;
gap:16px;
background:white;
color:#222;
border-radius:14px;
padding:14px;
margin-bottom:14px;
align-items:center;
}

.produto-item img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

.produto-info{
flex:1;
}

.produto-title{
font-weight:bold;
}

.produto-price{
color:#00a650;
font-weight:bold;
}

.produto-actions{
display:flex;
gap:8px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#1e0c3f;
padding:30px;
border-radius:16px;
width:500px;
max-width:90%;
}

.modal-content input,
.modal-content textarea,
.modal-content select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:14px;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<div class="admin-container">

<div class="admin-header">

<h1>🛒 Lojinha do Desafio</h1>

<div class="admin-actions">

<button class="admin-button" onclick="atualizarPrecos()">
🔄 Atualizar todos os preços
</button>

<button class="admin-button" onclick="abrirModal()">
+ Adicionar oferta
</button>

<button class="admin-button" onclick="salvarGithub()">
💾 Salvar Loja
</button>

</div>

</div>

<div id="listaProdutos"></div>

</div>

<!-- MODAL -->

<div class="modal" id="modalProduto">

<div class="modal-content">

<h2>Oferta</h2>

<label>Título</label>
<input id="titulo">

<label>Descrição</label>
<input id="descricao">

<label>Link Produto</label>
<input id="produtoLink">

<label>HTML do produto</label>
<textarea id="htmlProduto" rows="5"></textarea>

<button onclick="extrairDados()">Extrair dados</button>

<label>Link Afiliado</label>
<input id="linkAfiliado">

<label>Preço</label>
<input id="preco">

<label>Imagem</label>
<input id="imagem">

<label>Categoria</label>
<input id="categoria">

<label>Ordem</label>
<input id="ordem" type="number">

<div style="display:flex;gap:10px">

<button class="admin-button" onclick="fecharModal()">
Cancelar
</button>

<button class="admin-button" onclick="salvarProduto()">
Salvar
</button>

</div>

</div>

</div>

<script src="admin.js"></script>

</body>
</html>
